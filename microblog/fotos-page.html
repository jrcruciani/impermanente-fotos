<!--
  Source of truth del HTML+JS de la página /fotos/ en micro.blog.

  USO: copiar TODO el contenido de este archivo y pegarlo en
       micro.blog → Pages → /fotos/ (sustituyendo el contenido anterior).

  Comportamiento:
    - Hace fetch de https://fotos.impermanente.es/feed.json (las 30 últimas).
    - Renderiza cada foto con: imagen + caption (alt-text o content) + "Ciudad, País · fecha".
    - Click → lleva a la página propia https://fotos.impermanente.es/foto/{status_id}/
      (no a Pixelfed; desde ahí ya hay link a Pixelfed).

  Notas técnicas:
    - micro.blog DECODIFICA entidades HTML dentro de <script>. Ese bug rompe
      cualquier ampersand-amp o quot literal en el JS. Este código NO usa
      entidades HTML literales en el JS; el escape HTML para los strings
      dinámicos se construye con document.createElement('div').textContent
      (técnica segura).
    - Cache: ?cb=Date.now() fuerza al navegador a no usar caché local del
      feed. El CDN de GitHub Pages aún puede servir feed cacheado hasta 600s.
-->

<div id="fotos-gallery" class="fotos-gallery-root">
  <p class="fg-loading">Cargando fotos…</p>
</div>

<style>
.fotos-gallery-root { margin: 1.5rem 0; }
.fotos-gallery-root .fg-loading { opacity: .6; font-style: italic; }
.fotos-gallery-root .fg-item { margin-bottom: 30px; }
.fotos-gallery-root .fg-item a {
  text-decoration: none;
  color: inherit;
  display: block;
}
.fotos-gallery-root .fg-item img {
  width: calc(100% - 10px);
  margin: 5px;
  display: block;
  border: 5px solid #fff;
  outline: 5px solid #000;
  outline-offset: 0;
  height: auto;
}
@media (prefers-color-scheme: dark) {
  .fotos-gallery-root .fg-item img {
    border: 5px solid #000;
    outline: 5px solid #fff;
  }
}
.fotos-gallery-root .fg-item:hover { opacity: .85; }
.fotos-gallery-root .fg-info { margin-top: 10px; }
.fotos-gallery-root .fg-caption {
  font-size: .98rem;
  margin: 0;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  opacity: .85;
}
.fotos-gallery-root .fg-meta {
  display: block;
  font-size: .8rem;
  margin-top: 5px;
  text-transform: uppercase;
  letter-spacing: 1px;
  opacity: .6;
}
.fotos-gallery-root .fg-error {
  font-size: .9rem;
  opacity: .7;
}
</style>

<script>
(function () {
  var FEED_URL = 'https://fotos.impermanente.es/feed.json?cb=' + Date.now();
  var SITE_URL = 'https://fotos.impermanente.es';

  function escapeHTML(value) {
    var div = document.createElement('div');
    div.textContent = value == null ? '' : String(value);
    return div.innerHTML;
  }

  function fmtDateEs(iso) {
    if (!iso) return '';
    var d = new Date(iso);
    if (isNaN(d.getTime())) return '';
    var months = ['ene', 'feb', 'mar', 'abr', 'may', 'jun', 'jul', 'ago', 'sep', 'oct', 'nov', 'dic'];
    return d.getDate() + ' ' + months[d.getMonth()] + ' ' + d.getFullYear();
  }

  function fmtPlace(place) {
    if (!place || !place.name) return '';
    var name = String(place.name).trim();
    var country = place.country ? String(place.country).trim() : '';
    return country ? (name + ', ' + country) : name;
  }

  // El alt-text en feed.json puede ser un fallback genérico cuando aún no
  // hay alt-text real en Pixelfed (build_site.py inyecta estos placeholders).
  // Si lo detectamos, no lo mostramos como caption — mostramos solo ubicación + fecha.
  function isFallbackAlt(text, place) {
    if (!text) return true;
    if (text === 'Foto de Hispania Obscura') return true;
    if (place && place.name && text === ('Foto en ' + place.name)) return true;
    return false;
  }

  function render(posts) {
    var container = document.getElementById('fotos-gallery');
    if (!container) return;
    if (!Array.isArray(posts) || !posts.length) {
      container.innerHTML = '<p class="fg-error">No hay fotos por ahora.</p>';
      return;
    }
    var html = '';
    posts.forEach(function (post) {
      var media = (post.media_attachments || [])[0];
      if (!media || media.type !== 'image') return;

      var statusId = post.id;
      var url = SITE_URL + '/foto/' + encodeURIComponent(statusId) + '/';
      var alt = media.description || '';
      var altIsReal = !isFallbackAlt(alt, post.place);

      var caption = '';
      if (altIsReal && alt) {
        caption = alt.length > 120 ? alt.substr(0, 120) : alt;
      } else if (post.content_text) {
        caption = String(post.content_text).split('\n')[0];
      }

      var place = fmtPlace(post.place);
      var date = fmtDateEs(post.created_at);
      var metaParts = [];
      if (place) metaParts.push(escapeHTML(place));
      if (date) metaParts.push(escapeHTML(date));
      var metaLine = metaParts.length
        ? ('<span class="fg-meta">' + metaParts.join(' \u00b7 ') + '</span>')
        : '';
      var captionHtml = caption
        ? ('<p class="fg-caption">' + escapeHTML(caption) + '</p>')
        : '';

      var altAttr = escapeHTML(altIsReal && alt ? alt : (place || 'Foto'));
      var imgSrc = escapeHTML(media.preview_url || media.url || '');

      html +=
        '<div class="fg-item">' +
          '<a href="' + escapeHTML(url) + '">' +
            '<img src="' + imgSrc + '" alt="' + altAttr + '" loading="lazy">' +
            '<div class="fg-info">' + captionHtml + metaLine + '</div>' +
          '</a>' +
        '</div>';
    });
    container.innerHTML = html;
  }

  function showError() {
    var container = document.getElementById('fotos-gallery');
    if (!container) return;
    container.innerHTML =
      '<p class="fg-error">Las fotos no han cargado. Visita ' +
      '<a href="' + SITE_URL + '/">fotos.impermanente.es</a> directamente.</p>';
  }

  fetch(FEED_URL)
    .then(function (r) {
      if (!r.ok) throw new Error('fetch failed: ' + r.status);
      return r.json();
    })
    .then(render)
    .catch(showError);
})();
</script>
