name: Build & deploy fotos.impermanente.es

on:
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'data/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:
  schedule:
    # Cada 6 horas: detecta fotos nuevas y rebuild + deploy.
    - cron: '17 */6 * * *'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: build-fotos
  cancel-in-progress: false

jobs:
  fetch-and-publish:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.detect.outputs.changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore/save images cache
        uses: actions/cache@v5
        with:
          path: data/images_cache
          key: images-${{ hashFiles('data/inventory.jsonl') }}
          restore-keys: |
            images-

      - name: Fetch inventory delta from Pixelfed
        env:
          PIXELFED_INSTANCE: ${{ secrets.PIXELFED_INSTANCE }}
          PIXELFED_USERNAME: ${{ secrets.PIXELFED_USERNAME }}
          PIXELFED_ACCOUNT_ID: ${{ secrets.PIXELFED_ACCOUNT_ID }}
          PIXELFED_ACCESS_TOKEN: ${{ secrets.PIXELFED_ACCESS_TOKEN }}
        run: |
          mkdir -p $HOME/.config/hispania-obscura
          cat > $HOME/.config/hispania-obscura/.env <<EOF
          PIXELFED_INSTANCE="${PIXELFED_INSTANCE}"
          PIXELFED_USERNAME="${PIXELFED_USERNAME}"
          PIXELFED_ACCOUNT_ID="${PIXELFED_ACCOUNT_ID}"
          PIXELFED_ACCESS_TOKEN="${PIXELFED_ACCESS_TOKEN}"
          EOF
          chmod 600 $HOME/.config/hispania-obscura/.env
          python3 scripts/fetch_inventory.py

      - name: Detect changes in data/
        id: detect
        run: |
          if git diff --quiet --exit-code data/inventory.jsonl data/published.jsonl 2>/dev/null; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit data updates (if any)
        if: steps.detect.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "data: refresh inventory $(date -u +%Y-%m-%dT%H:%M:%SZ)" || echo "No commit needed"
          git push

  build-and-deploy:
    needs: fetch-and-publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (latest, includes data refresh)
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore images cache
        uses: actions/cache@v5
        with:
          path: data/images_cache
          key: images-${{ hashFiles('data/inventory.jsonl') }}
          restore-keys: |
            images-

      - name: Ensure images cache is populated (fallback fetch)
        env:
          PIXELFED_INSTANCE: ${{ secrets.PIXELFED_INSTANCE }}
          PIXELFED_USERNAME: ${{ secrets.PIXELFED_USERNAME }}
          PIXELFED_ACCOUNT_ID: ${{ secrets.PIXELFED_ACCOUNT_ID }}
          PIXELFED_ACCESS_TOKEN: ${{ secrets.PIXELFED_ACCESS_TOKEN }}
        run: |
          EXPECTED=$(wc -l < data/inventory.jsonl | tr -d ' ')
          ACTUAL=$(ls data/images_cache/ 2>/dev/null | wc -l | tr -d ' ')
          echo "Images cache: $ACTUAL / $EXPECTED"
          if [ "$ACTUAL" -lt "$EXPECTED" ]; then
            echo "Cache incompleto, re-fetching..."
            mkdir -p $HOME/.config/hispania-obscura
            cat > $HOME/.config/hispania-obscura/.env <<EOF
          PIXELFED_INSTANCE="${PIXELFED_INSTANCE}"
          PIXELFED_USERNAME="${PIXELFED_USERNAME}"
          PIXELFED_ACCOUNT_ID="${PIXELFED_ACCOUNT_ID}"
          PIXELFED_ACCESS_TOKEN="${PIXELFED_ACCESS_TOKEN}"
          EOF
            chmod 600 $HOME/.config/hispania-obscura/.env
            python3 scripts/fetch_inventory.py
          else
            echo "Cache OK, skip fetch"
          fi

      - name: Build static site
        run: python3 scripts/build_site.py

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          publish_branch: gh-pages
          cname: fotos.impermanente.es
          force_orphan: true
